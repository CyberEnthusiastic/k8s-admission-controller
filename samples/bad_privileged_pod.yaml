apiVersion: v1
kind: Pod
metadata:
  name: evil-privileged-pod
  namespace: prod
spec:
  hostNetwork: true
  hostPID: true
  containers:
    - name: app
      image: alpine:latest
      securityContext:
        privileged: true
        allowPrivilegeEscalation: true
        runAsUser: 0
        capabilities:
          add: ["SYS_ADMIN", "NET_ADMIN"]
  volumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock
