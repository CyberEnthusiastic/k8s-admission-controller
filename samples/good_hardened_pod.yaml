apiVersion: v1
kind: Pod
metadata:
  name: hardened-pod
  namespace: prod
spec:
  serviceAccountName: hardened-sa
  automountServiceAccountToken: false
  containers:
    - name: app
      image: ghcr.io/myorg/app:1.2.3
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        runAsUser: 10001
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
          add: ["NET_BIND_SERVICE"]
      resources:
        limits:
          cpu: "500m"
          memory: "256Mi"
        requests:
          cpu: "100m"
          memory: "64Mi"
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
      readinessProbe:
        httpGet:
          path: /ready
          port: 8080
